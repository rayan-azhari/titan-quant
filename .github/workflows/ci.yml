name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11

      - name: Lint (ruff)
        run: uv run --extra dev ruff check .

      - name: Redaction gate (no secrets / account ids / proprietary names)
        run: uv run python scripts/check_public_redaction.py .

      - name: Methodology anti-pattern scan
        run: uv run --extra dev python scripts/audit_codebase_methodology.py --paths titan || true

      - name: Tests (framework safety net)
        run: uv run --extra demo --extra dev pytest tests/ -q

  # NOTE: this repository is code-only. The companion book is published as built
  # HTML to the gh-pages branch from the (private) source repository; it is not
  # built or deployed here.
