name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11

      - name: Lint (ruff)
        run: uv run --extra dev ruff check .

      - name: Redaction gate (no secrets / account ids / proprietary names)
        run: uv run python scripts/check_public_redaction.py .

      - name: Methodology anti-pattern scan
        run: uv run --extra dev python scripts/audit_codebase_methodology.py --paths titan || true

      - name: Tests (framework safety net)
        run: uv run --extra demo --extra dev pytest tests/ -q

      - name: Build the book
        run: |
          uv run --extra dev mkdocs build --strict -f book/mkdocs.yml

  # Publish the book to GitHub Pages (only on push to main, after quality passes).
  deploy-book:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Build the book
        run: uv run --extra dev mkdocs build --strict -f book/mkdocs.yml
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload book site
        uses: actions/upload-pages-artifact@v3
        with:
          path: book/site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
